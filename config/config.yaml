# ============================================================
# AUTONOMOUS ML TRAINING LOOP - CONFIGURATION
# ============================================================
# All paths are relative to BASE_DIR (C:\AI) unless absolute.
# Changes here drive the orchestrator. No code edits needed
# for normal tuning.
# ============================================================

system:
  base_dir: "C:/AI"
  random_seed: 42
  max_loop_iterations: 10        # hard cap on autonomous loops per run
  halt_on_safety_violation: true

# ---------- DATA PIPELINE ----------
data:
  raw_dir: "data_raw"
  clean_dir: "data_clean"
  curated_dir: "data_curated"
  target_column: "target"         # column name to predict
  test_split: 0.2
  min_rows_after_clean: 50        # safety floor
  schema:
    # Define required columns. Extras allowed, missing = halt.
    # Types: int, float, str, bool
    required_columns:
      - name: "target"
        type: "int"
    allow_extra_columns: true

# ---------- MODEL / TRAINING ----------
training:
  model_type: "sklearn_rf"        # sklearn_rf | sklearn_logreg | pytorch_mlp
  hyperparameters:
    sklearn_rf:
      n_estimators: 100
      max_depth: 10
      min_samples_split: 2
    sklearn_logreg:
      C: 1.0
      max_iter: 1000
    pytorch_mlp:
      hidden_dims: [64, 32]
      learning_rate: 0.001
      batch_size: 32
      epochs: 20
      dropout: 0.2

# ---------- EVALUATION ----------
evaluation:
  metrics:
    - accuracy
    - f1_macro
    - log_loss
  overfitting_threshold: 0.15     # train - val gap that flags overfit
  confidence_drift_threshold: 0.10  # tabular "hallucination" proxy
  instruction_drift_threshold: 0.05 # class distribution shift in predictions
  min_score_to_promote: 60        # score out of 100

# ---------- ORCHESTRATOR DECISIONS ----------
orchestrator:
  improvement_delta: 1.0          # score must improve by this much to promote
  plateau_tolerance: 2            # N iterations w/o improvement = plateau
  retry_on_failure: 1             # retry count before halt
  actions:
    on_improve: "promote"
    on_regress: "refine_data"
    on_plateau: "tune_hyperparams"
  hyperparam_tuning:
    # When plateau hit, orchestrator nudges these
    sklearn_rf:
      n_estimators: [100, 200, 400]
      max_depth: [5, 10, 20]

# ---------- LOGGING ----------
logging:
  level: "INFO"
  log_dir: "logs"
  cowork_ops_dir: "cowork_ops"
  format: "json"                  # json | text
  retain_runs: 50
