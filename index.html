<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Local AI Chat</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    height: 100vh;
    margin: 0;
  }
  #sidebar {
    width: 260px;
    background: #0d0d0d;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 10px;
  }
  #sidebar h3 {
    margin: 0;
    font-size: 14px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #new-chat-btn {
    width: 100%;
    padding: 10px;
    background: #1e3a5f;
    color: #e3f2fd;
    border: 1px solid #2c5282;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  #new-chat-btn:hover { background: #2c5282; }
  #session-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .session-item {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: #ccc;
    border: 1px solid transparent;
  }
  .session-item:hover { background: #1a1a1a; }
  .session-item.active {
    background: #1a1a1a;
    border-color: #444;
    color: #fff;
  }
  .session-item .title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-item .delete {
    opacity: 0;
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    padding: 2px 8px;
    font-size: 18px;
    line-height: 1;
  }
  .session-item:hover .delete { opacity: 1; }
  .session-item .delete:hover { color: #ff6b6b; }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 0;
  }
  .toolbar {
    width: min(900px, 95vw);
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }
  #chat {
    width: min(900px, 95vw);
    flex: 1;
    border: 1px solid #444;
    overflow-y: auto;
    padding: 15px;
    margin: 10px 0;
    background: #1a1a1a;
    border-radius: 10px;
  }
  .msg { margin: 10px 0; display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.bot  { justify-content: flex-start; }
  .bubble {
    max-width: 70%;
    padding: 10px 12px;
    border-radius: 12px;
    white-space: pre-wrap;
    line-height: 1.4;
  }
  .msg.user .bubble  { background: #1e3a5f; color: #e3f2fd; }
  .msg.bot .bubble   { background: #2a2a2a; color: #c8e6c9; }
  .msg.error .bubble { background: #4a1f1f; color: #ffcdd2; }
  .input-area {
    width: min(900px, 95vw);
    display: flex;
    gap: 10px;
    padding-bottom: 20px;
  }
  select, textarea, button {
    border-radius: 8px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: white;
    outline: none;
    font-family: inherit;
  }
  select { padding: 10px; }
  .toolbar button, #send-btn {
    padding: 10px 16px;
    background: #333;
    border: none;
    cursor: pointer;
  }
  .toolbar button:hover, #send-btn:hover { background: #444; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  textarea { flex: 1; padding: 12px; height: 60px; resize: none; }
  .empty-state { color: #666; font-size: 12px; text-align: center; padding: 20px 10px; }
</style>
</head>
<body>

<div id="sidebar">
  <button id="new-chat-btn">+ New Chat</button>
  <h3>History</h3>
  <div id="session-list"></div>
</div>

<div id="main">
  <div class="toolbar">
    <select id="model-select"></select>
  </div>
  <div id="chat"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Type something..."></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script type="module">
import { populateModelSelect, DEFAULT_MODEL } from "./models.js";

const API_BASE = "http://127.0.0.1:8000";
const SYSTEM_PROMPT = { role: "system", content: "You are a helpful coding assistant." };
const SESSION_KEY = "chat_session_id";

const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const modelEl = document.getElementById("model-select");
const sendBtn = document.getElementById("send-btn");
const newChatBtn = document.getElementById("new-chat-btn");
const sessionListEl = document.getElementById("session-list");

let chatHistory = [SYSTEM_PROMPT];
let sessionId = null;

populateModelSelect(modelEl, DEFAULT_MODEL);

function appendMessage(role, text = "") {
  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function clearChatUI() {
  chatEl.innerHTML = "";
  chatHistory = [SYSTEM_PROMPT];
}

async function refreshSessionList() {
  try {
    const res = await fetch(`${API_BASE}/sessions`);
    const sessions = await res.json();
    sessionListEl.innerHTML = "";

    if (sessions.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No past chats yet";
      sessionListEl.appendChild(empty);
      return;
    }

    for (const s of sessions) {
      const item = document.createElement("div");
      item.className = "session-item" + (s.id === sessionId ? " active" : "");

      const title = document.createElement("span");
      title.className = "title";
      title.textContent = s.title || "Untitled";
      item.appendChild(title);

      const del = document.createElement("button");
      del.className = "delete";
      del.textContent = "×";
      del.title = "Delete chat";
      del.addEventListener("click", async (e) => {
        e.stopPropagation();
        try {
          const r = await fetch(`${API_BASE}/sessions/${s.id}`, { method: "DELETE" });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          if (s.id === sessionId) {
            await createNewSession();
          } else {
            await refreshSessionList();
          }
        } catch (err) {
          console.error("Delete failed:", err);
        }
      });
      item.appendChild(del);

      item.addEventListener("click", () => loadSession(s.id));
      sessionListEl.appendChild(item);
    }
  } catch (err) {
    console.error("Failed to load sessions:", err);
  }
}

function setSession(id) {
  sessionId = id;
  localStorage.setItem(SESSION_KEY, id);
}

async function createNewSession() {
  const res = await fetch(`${API_BASE}/sessions`, { method: "POST" });
  const data = await res.json();
  setSession(data.session_id);
  clearChatUI();
  await refreshSessionList();
  inputEl.focus();
}

async function loadSession(id) {
  try {
    const res = await fetch(`${API_BASE}/sessions/${id}/messages`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    setSession(id);
    clearChatUI();
    chatHistory = [SYSTEM_PROMPT, ...data];
    for (const msg of data) {
      appendMessage(msg.role === "user" ? "user" : "bot", msg.content);
    }
    await refreshSessionList();
  } catch {
    await createNewSession();
  }
}

async function sendMessage() {
  const message = inputEl.value.trim();
  if (!message || !sessionId) return;

  sendBtn.disabled = true;
  inputEl.value = "";

  appendMessage("user", message);
  chatHistory.push({ role: "user", content: message });

  const botBubble = appendMessage("bot", "");

  try {
    const response = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id: sessionId,
        messages: chatHistory,
        model: modelEl.value,
      }),
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let aiMessage = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      aiMessage += decoder.decode(value, { stream: true });
      botBubble.textContent = aiMessage;
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    chatHistory.push({ role: "assistant", content: aiMessage });
    await refreshSessionList();
  } catch (err) {
    botBubble.parentElement.className = "msg error";
    botBubble.textContent = `Error: ${err.message}`;
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener("click", sendMessage);
newChatBtn.addEventListener("click", createNewSession);

window.addEventListener("load", async () => {
  await refreshSessionList();
  const stored = localStorage.getItem(SESSION_KEY);
  if (stored) {
    await loadSession(stored);
  } else {
    await createNewSession();
  }
});
</script>

</body>
</html>
